name: Daily AI Digest

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch: {}   # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch feeds
        run: node scripts/fetch-feeds.js

      - name: Fetch VS Code updates
        run: node scripts/fetch-vscode-updates.js

      - name: Detect new model releases
        run: node scripts/detect-model-releases.js

      - name: Commit new digest
        run: |
          git config user.name "TechRadar Bot"
          git config user.email "bot@techradar.dev"
          git add src/content/feeds/ src/data/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "📡 Daily digest — $DATE"
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
